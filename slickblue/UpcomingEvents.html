        <div id="content">
            <div id="content_top"></div>

                <h2>Upcoming Events</h2>
                <p>&nbsp;</p>
                <h3>Event Opportunities</h3>
                <p>
                    The list below is loaded from <strong>upcomingEvents.json</strong>.
                </p>
                <p>&nbsp;</p>

                <ul id="upcomingEventsList" class="events-list"></ul>
                <p id="eventsMessage" class="form-message"></p>
            </div>

        </div>
    </div>

    <script type="text/javascript">
        (function () {
            var listElement = document.getElementById('upcomingEventsList');
            var messageElement = document.getElementById('eventsMessage');

            window.toggleEventSignup = function (buttonElement) {
                alert('You have beed added to this event');

                if (buttonElement.innerHTML === 'Sign Up') {
                    buttonElement.innerHTML = 'Leave';
                } else {
                    buttonElement.innerHTML = 'Sign Up';
                }
            };

            function setMessage(text, className) {
                messageElement.className = 'form-message ' + className;
                messageElement.innerHTML = text;
            }

            function renderEvents(events) {
                var html = '';
                var i;

                if (!events || !events.length) {
                    setMessage('No upcoming events are currently available.', 'error-message');
                    return;
                }

                for (i = 0; i < events.length; i++) {
                    html += '<li class="event-item">';
                    html += '<h4>Event ' + (i + 1) + '</h4>';
                    html += '<p><strong>Name:</strong> ' + (events[i].name || 'N/A') + '</p>';
                    html += '<p><strong>Date:</strong> ' + (events[i].date || 'N/A') + '</p>';
                    html += '<p><strong>Number of Volunteers Needed:</strong> ' +
                        (events[i].numOpportunities !== undefined ? events[i].numOpportunities : 'N/A') + '</p>';
                    html += '<button type="button" onclick="toggleEventSignup(this)">Sign Up</button>';
                    html += '</li>';
                }

                listElement.innerHTML = html;
                setMessage('Events loaded successfully.', 'success-message');
            }

            fetch('upcomingEvents.json')
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error('Unable to load event data.');
                    }
                    return response.json();
                })
                .then(function (events) {
                    renderEvents(events);
                })
                .catch(function () {
                    setMessage('Unable to load upcoming events at this time.', 'error-message');
                });
        })();
    </script>
</body>

</html>
